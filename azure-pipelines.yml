trigger:
- main

variables:
  dockerRegistryServiceConnection: '29d18059-fb10-4f86-b73a-1c8a0550c376'
  imageRepository: 'escuelapoliteecnicanacionalowlshare'
  containerRegistry: 'owlsharecr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

    - task: PowerShell@2
      displayName: Generate artifact manifest
      inputs:
        targetType: 'inline'
        script: |
          New-Item -ItemType Directory -Force -Path "$(Build.ArtifactStagingDirectory)/manifest"
          "$(containerRegistry)/$(imageRepository):$(tag)" | Out-File "$(Build.ArtifactStagingDirectory)/manifest/image.txt"

    - task: PublishBuildArtifacts@1
      displayName: Publish artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/manifest'
        ArtifactName: 'manifest'
        publishLocation: 'Container'